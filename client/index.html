<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旧日圣契</title>
<style>
/* ====== 全局重置 ====== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --warrior:#b3403a;--priest:#c4941a;--mage:#3a6fa8;--tank:#408a5c;
  --beastman:#c4752a;--assassin:#7b4ea0;
  --bg:#efe0c1;--panel:#e6d4af;--card-bg:#dcc896;--text:#3e2723;--text-dim:#6b5344;
  --gold:#8b6914;--danger:#a83232;--success:#4a7c3f;--info:#4a6fa5;
  --border-soft:#c4a882;--shadow-soft:rgba(80,45,20,0.12);
}
body{
  font-family:'Segoe UI','Microsoft YaHei',sans-serif;
  background:var(--bg);color:var(--text);
  width:100vw;height:100vh;overflow:hidden;
  user-select:none;
  display:flex;justify-content:center;align-items:center;
}
body.fullscreen-active .screen.active{max-width:none;max-height:none}

/* ====== 屏幕切换 ====== */
.screen{display:none;width:100%;height:100%;max-width:1440px;max-height:960px}
.screen.active{display:flex;flex-direction:column}

/* ====== 主菜单界面 ====== */
#menu-screen{
  justify-content:center;align-items:center;
  background:radial-gradient(ellipse at center, #f5e6c8 0%, #e2cf9f 100%);
  flex-direction:column;gap:30px;
}
.menu-title{font-size:52px;font-weight:bold;color:var(--gold);text-align:center}
.menu-subtitle{font-size:16px;color:var(--text-dim);text-align:center;margin-top:-20px}
.menu-buttons{display:flex;flex-direction:column;gap:14px;min-width:320px}
.menu-btn{
  padding:18px;border-radius:14px;border:2px solid var(--border-soft);font-size:22px;font-weight:bold;
  cursor:pointer;transition:all .2s;text-align:center;
}
.menu-btn:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(80,45,20,0.2)}
.menu-btn-start{background:var(--gold);color:#fffbf0}
.menu-btn-rules{background:var(--info);color:var(--text);box-shadow:0 4px 20px rgba(74,111,165,0.2)}
.menu-btn-rules:hover{box-shadow:0 8px 30px rgba(74,111,165,0.4)}
.menu-btn-library{background:rgba(123,78,160,0.7);color:var(--text)}
.menu-btn-library:hover{box-shadow:0 8px 30px rgba(123,78,160,0.35)}

/* ====== 大厅界面 ====== */
#lobby-screen{
  justify-content:center;align-items:center;
  background:radial-gradient(ellipse at center, #f5e6c8 0%, #e2cf9f 100%);
}
.lobby-panel{
  background:var(--panel);border-radius:16px;padding:40px;min-width:480px;
  box-shadow:0 0 60px rgba(80,45,20,0.15);
}
.lobby-panel h2{text-align:center;font-size:28px;margin-bottom:24px}
.lobby-panel input{
  width:100%;padding:14px 18px;margin:8px 0;border-radius:10px;
  border:2px solid var(--border-soft);background:#f8f0dc;color:var(--text);font-size:16px;
  transition:border .2s;
}
.lobby-panel input:focus{border-color:var(--gold);outline:none}
.lobby-panel button{
  width:100%;padding:14px;margin:6px 0;border-radius:10px;
  border:none;font-size:18px;font-weight:bold;cursor:pointer;
  transition:all .2s;
}
.btn-create{background:var(--success);color:var(--text)}
.btn-create:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(74,124,63,0.3)}
.btn-join{background:var(--info);color:var(--text)}
.btn-join:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(74,111,165,0.3)}
.lobby-divider{text-align:center;margin:16px 0;color:var(--text-dim)}
.lobby-error{color:var(--danger);text-align:center;margin-top:8px;min-height:24px}
.room-code-display{
  text-align:center;font-size:48px;letter-spacing:8px;
  color:var(--gold);margin:12px 0 8px;font-family:monospace;
}
.lobby-players{margin:8px 0}
.player-badge{
  padding:6px 14px;border-radius:20px;font-size:13px;font-weight:bold;
  border:2px solid var(--border-soft);white-space:nowrap;
}
.player-badge.host{background:rgba(139,105,20,0.1);border-color:var(--gold);color:var(--gold)}
.player-badge.you{background:rgba(74,111,165,0.12);border-color:var(--info);color:var(--info)}
.joined-confirm{
  text-align:center;margin-top:8px;color:var(--success);font-size:14px;
  padding:6px;border-radius:8px;background:rgba(74,124,63,0.08);
  border:1px solid rgba(74,124,63,0.2);
}

/* ====== 顶部信息栏 ====== */
#top-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 24px;background:var(--panel);border-bottom:1px solid var(--border-soft);
  height:50px;flex-shrink:0;
}
#top-bar .room-code{font-size:20px;font-weight:bold;color:var(--gold);letter-spacing:4px}
#top-bar .phase-text{font-size:14px;color:var(--text-dim)}
#top-bar .turn-info{font-size:14px;color:var(--text)}
#top-bar .btn-fullscreen{
  background:transparent;border:1px solid var(--border-soft);color:var(--text-dim);
  padding:4px 12px;border-radius:6px;cursor:pointer;font-size:16px;
  transition:all .2s;
}
#top-bar .btn-fullscreen:hover{border-color:var(--gold);color:var(--gold)}

/* ====== 游戏主区域 ====== */
#game-screen{position:relative;background:radial-gradient(ellipse at center, #f0e0c0 0%, #d8c794 100%)}
#game-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:inherit}

/* 4人桌面十字布局 */
.board-inner{
  display:flex;flex-direction:column;align-items:center;gap:18px;
  width:100%;max-width:900px;padding:0 20px;
}
.board-row{display:flex;justify-content:center;gap:28px;flex-wrap:wrap}
.board-mid-row{display:flex;align-items:center;justify-content:center;gap:80px}

/* 玩家状态卡 */
.player-card{
  background:var(--panel);border-radius:12px;padding:10px 16px;
  border:2px solid var(--border-soft);width:210px;transition:all .3s;
}
.player-card.current-turn{border-color:var(--gold);box-shadow:0 0 20px rgba(139,105,20,0.3)}
.player-card.dead{opacity:0.4;filter:grayscale(0.8)}
.player-card.disconnected{border-color:#a83232}
.player-card .char-icon{font-size:28px;margin-right:8px}
.player-card .name{font-weight:bold;font-size:15px}
.player-card .hp-bar{
  height:8px;background:rgba(62,39,35,0.15);border-radius:4px;margin:6px 0;overflow:hidden;
}
.player-card .hp-fill{height:100%;border-radius:4px;transition:width .5s}
.player-card .buffs{font-size:18px;margin-top:4px}
.player-card .beast-badge{
  display:inline-block;padding:2px 8px;border-radius:6px;
  font-size:12px;margin-top:4px;
}
.player-card.targetable{cursor:pointer;border-color:var(--danger)}
.player-card.targetable:hover{box-shadow:0 0 16px rgba(168,50,50,0.4)}

/* 手牌区域 */
#hand-area{
  display:flex;justify-content:center;align-items:flex-end;gap:6px;
  padding:10px 0;min-height:170px;flex-shrink:0;
}
.card{
  width:100px;height:145px;border-radius:12px;
  background:var(--card-bg);border:2px solid var(--border-soft);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
  flex-shrink:0;
}
.card:hover{width:120px;height:170px;border-color:var(--gold);z-index:10;box-shadow:0 8px 28px rgba(80,45,20,0.25)}
.card.selected{transform:translateY(-26px);border-color:var(--gold);box-shadow:0 0 24px rgba(139,105,20,0.5)}
.card.unplayable{opacity:0.5;cursor:not-allowed}
.card .card-name{font-size:12px;font-weight:bold;margin-bottom:5px;text-align:center}
.card .card-icons{font-size:22px;display:flex;flex-wrap:wrap;justify-content:center;gap:2px}
.card .card-desc{font-size:10px;color:var(--text-dim);margin-top:5px;text-align:center;padding:0 4px}
.card .card-char-tag{font-size:10px;opacity:0.7;position:absolute;top:4px;right:6px}

/* 牌库 & 弃牌堆面板 */
#deck-display{display:flex;align-items:center;gap:10px;margin:0 16px}
.deck-stack,.discard-stack{
  width:60px;height:85px;border-radius:8px;border:2px solid var(--border-soft);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;position:relative;
  background:var(--card-bg);font-size:12px;color:var(--text-dim);
}
.deck-stack:hover{border-color:var(--info)}
.discard-stack:hover{border-color:var(--gold)}
.deck-stack .stack-label,.discard-stack .stack-label{font-size:10px;margin-top:2px}
.deck-stack .stack-count,.discard-stack .stack-count{font-size:18px;font-weight:bold}

/* 弃牌堆查看弹窗 */
.discard-modal-content{
  background:var(--panel);border-radius:16px;padding:24px;max-width:700px;
  max-height:500px;overflow-y:auto;
}
.discard-modal-content h3{font-size:20px;margin-bottom:16px;text-align:center}
.discard-list{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.discard-mini-card{
  width:72px;height:100px;border-radius:8px;border:1px solid var(--border-soft);
  background:var(--card-bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-size:10px;text-align:center;
}
.discard-mini-card .mini-name{font-size:9px;font-weight:bold;margin-bottom:2px}
.discard-mini-card .mini-icons{font-size:14px}

/* 换牌选择器 */
#gift-picker{display:none;text-align:center;padding:12px 0}
#gift-picker.show{display:block}
#gift-picker h4{color:var(--gold);margin-bottom:8px}
#gift-picker .gift-cards{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
#gift-picker .gift-card{
  width:80px;height:112px;border-radius:10px;border:2px solid var(--border-soft);
  background:var(--card-bg);cursor:pointer;transition:all .2s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
#gift-picker .gift-card:hover{border-color:var(--danger);transform:translateY(-6px);box-shadow:0 0 20px rgba(255,68,68,0.4)}

/* 底部操作栏 */
#action-bar{
  display:flex;justify-content:center;align-items:center;gap:14px;
  padding:10px 24px;background:var(--panel);border-top:1px solid var(--border-soft);
  height:56px;flex-shrink:0;position:relative;z-index:10;
}
#action-bar button{
  padding:8px 28px;border-radius:10px;border:none;
  font-size:15px;font-weight:bold;cursor:pointer;transition:all .2s;
}
.btn-play-card{background:var(--success);color:#000;min-width:100px}
.btn-play-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(106,191,90,0.3)}
.btn-play-card:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none}
.btn-pass-turn{background:var(--text-dim);color:var(--text-dim);min-width:90px;transition:all .3s}
.btn-pass-turn:hover:not(:disabled){background:#c4752a;color:var(--text);transform:translateY(-2px)}
.btn-pass-turn.active{background:#c4752a;color:var(--text)}
.btn-pass-turn.active:hover{background:var(--gold);box-shadow:0 4px 20px rgba(230,126,34,0.4)}
.btn-pass-turn:disabled{opacity:0.25;cursor:not-allowed;transform:none}
.btn-chain-skip{background:#c4752a;color:#000}
.btn-chain-cont{background:var(--info);color:var(--text)}

/* 小时钟倒计时 */
#countdown-box{display:flex;align-items:center;gap:6px;min-width:90px;justify-content:center}
#countdown-box .hourglass{font-size:22px}
#countdown-box .cd-num{font-size:22px;font-weight:bold;color:var(--gold);min-width:36px;text-align:center}
#countdown-box.urgent .cd-num{color:var(--danger);animation:cd-blink .5s infinite}
#countdown-box.urgent .hourglass{animation:cd-blink .5s infinite}
@keyframes cd-blink{50%{opacity:0.3}}

/* ====== 特效画布 ====== */
#fx-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}

/* 战斗日志 */
#log-panel{
  width:300px;max-height:280px;overflow-y:auto;overflow-x:hidden;
  background:rgba(80,45,20,0.75);border-radius:12px;padding:10px 14px;
  font-size:12px;color:var(--text-dim);flex-shrink:0;
  position:absolute;left:10px;bottom:10px;z-index:6;
}
#log-panel .log-entry{margin:3px 0;padding:3px 0;border-bottom:1px solid rgba(62,39,35,0.07)}

/* 图标含义图例 */
#icon-legend{
  position:absolute;top:10px;right:10px;
  width:210px;background:rgba(80,45,20,0.8);border-radius:8px;padding:8px 10px;
  font-size:10px;color:var(--text-dim);z-index:6;max-height:280px;overflow-y:auto;
  border:1px solid var(--border-soft);transition:opacity .3s;
}
#icon-legend .legend-title{font-size:11px;font-weight:bold;color:var(--gold);margin-bottom:6px;text-align:center}
#icon-legend .legend-row{display:flex;align-items:center;gap:4px;margin:2px 0;padding:1px 0}
#icon-legend .legend-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0}
#icon-legend .legend-desc{flex:1;line-height:1.3}
#icon-legend .legend-divider{border-top:1px solid var(--border-soft);margin:4px 0;text-align:center;font-size:9px;color:var(--text-dim);padding-top:2px}

/* 弹窗/遮罩 */
.modal-overlay{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(80,45,20,0.7);z-index:100;justify-content:center;align-items:center;
}
.modal-overlay.show{display:flex}
.modal-box{
  background:var(--panel);border-radius:16px;padding:32px;
  max-width:600px;text-align:center;box-shadow:0 0 80px rgba(80,45,20,0.5);
}
.modal-box h2{font-size:26px;margin-bottom:16px}
.modal-box button{
  padding:12px 32px;margin:6px;border-radius:10px;border:none;
  font-size:16px;font-weight:bold;cursor:pointer;
}
.modal-box button:hover{opacity:0.85}

/* 规则弹窗 & 图鉴弹窗（大尺寸可滚动） */
.rules-box,.library-box{
  max-width:800px;max-height:85vh;overflow-y:auto;text-align:left;
  padding:28px 34px;
}
.rules-box h2,.library-box h2{text-align:center;font-size:28px;margin-bottom:8px}
.rules-box h3,.library-box h3{color:var(--gold);font-size:16px;margin:16px 0 6px}
.rules-box p,.library-box p{font-size:13px;color:#5c4033;line-height:1.7;margin:4px 0}
.rules-box .section,.library-box .section{
  background:rgba(62,39,35,0.04);border-radius:10px;padding:12px 16px;margin:8px 0;
}
.library-char{font-size:18px;font-weight:bold;margin-top:16px;display:flex;align-items:center;gap:8px}
.library-card-grid{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 12px}
.library-mini-card{
  background:rgba(62,39,35,0.05);border-radius:8px;padding:6px 10px;
  font-size:11px;color:#5c4033;border:1px solid rgba(62,39,35,0.12);
  display:inline-flex;align-items:center;gap:4px;
}
.library-btn-close{
  display:block;margin:16px auto 0;padding:10px 40px;border-radius:10px;
  border:none;font-size:15px;font-weight:bold;cursor:pointer;
  background:var(--info);color:var(--text);
}

/* ====== 选角界面 ====== */
#pick-screen{
  background:radial-gradient(ellipse at center, #efe0c1 0%, #e2cf9f 100%);
  padding:20px 30px;overflow-y:auto;
}
.pick-header{text-align:center;margin-bottom:12px}
.pick-header h2{font-size:28px;margin-bottom:4px}
.pick-header .pick-info{color:var(--text-dim);font-size:15px;min-height:22px}
.pick-countdown{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:6px;font-size:20px}
.pick-countdown .hourglass{font-size:24px}
.pick-countdown .cd-num{font-weight:bold;color:var(--gold);min-width:30px;text-align:center}
.pick-countdown.urgent .cd-num{color:var(--danger);animation:cd-blink .5s infinite}
.pick-countdown.urgent .hourglass{animation:cd-blink .5s infinite}
.pick-layout{display:flex;gap:24px;max-width:1400px;margin:0 auto;align-items:flex-start}
/* 左侧角色网格 */
.char-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;flex:1}
.char-card{
  padding:14px;border-radius:14px;border:3px solid var(--border-soft);
  text-align:center;cursor:pointer;transition:all .2s;
  background:var(--panel);position:relative;
}
.char-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(80,45,20,0.4)}
.char-card.selected{border-color:var(--gold);box-shadow:0 0 20px rgba(139,105,20,0.3);transform:translateY(-4px)}
.char-card.picked{opacity:0.35;cursor:not-allowed;transform:none}
.char-card.picked:hover{transform:none;box-shadow:none}
.char-card .char-emoji{font-size:52px;margin-bottom:6px;display:block}
.char-card .char-name{font-weight:bold;font-size:17px;margin-bottom:2px}
.char-card .char-title{font-size:11px;color:var(--text-dim);margin-bottom:4px}
.char-card .char-hp{font-size:11px;color:var(--text-dim)}
.char-card .picked-badge{
  position:absolute;top:8px;right:10px;background:var(--danger);color:var(--text);
  font-size:10px;padding:2px 8px;border-radius:8px
}
/* 右侧详情面板 */
.pick-detail{
  width:360px;flex-shrink:0;background:var(--panel);
  border-radius:16px;padding:24px;border:2px solid var(--border-soft);
  position:sticky;top:20px;min-height:400px;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
}
.pick-detail .placeholder{color:var(--text-dim);font-size:15px;text-align:center;line-height:2}
.pick-detail .preview-emoji{font-size:96px;display:block;margin-bottom:8px}
.pick-detail .preview-name{font-size:26px;font-weight:bold;margin-bottom:2px}
.pick-detail .preview-title{font-size:14px;color:var(--text-dim);margin-bottom:12px}
.pick-detail .preview-desc{font-size:13px;color:#5c4033;text-align:center;line-height:1.6;margin-bottom:16px}
.pick-detail .preview-skills{width:100%}
.pick-detail .preview-skills h4{font-size:13px;color:var(--gold);margin-bottom:6px}
.pick-detail .skill-item{
  font-size:12px;padding:6px 10px;margin:4px 0;border-radius:8px;
  background:rgba(80,45,20,0.25);line-height:1.5
}
.pick-detail .preview-cards{width:100%;margin-top:12px}
.pick-detail .preview-cards h4{font-size:13px;color:var(--gold);margin-bottom:4px}
.pick-detail .cards-text{font-size:11px;color:var(--text-dim);line-height:1.5}
.btn-confirm{
  width:100%;margin-top:16px;padding:14px;border-radius:12px;border:none;
  font-size:18px;font-weight:bold;cursor:pointer;transition:all .2s;
  background:var(--gold);color:#000;
}
.btn-confirm:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(139,105,20,0.4)}
.btn-confirm:disabled{opacity:0.3;cursor:not-allowed;transform:none;box-shadow:none}

/* 掷骰动画 */
.dice-result{
  font-size:60px;animation:diceRoll .6s ease-out;
}
@keyframes diceRoll{0%{transform:rotate(0) scale(0)}50%{transform:rotate(360deg) scale(1.5)}100%{transform:rotate(720deg) scale(1)}}

/* 连锁弹窗 */
#chain-modal .modal-box{min-width:400px}
#chain-modal .chain-timer{font-size:48px;color:var(--danger);margin:16px 0}

/* 胜利弹窗 */
.winner-char{font-size:80px;margin:16px 0}
.winner-text{font-size:36px;color:var(--gold);font-weight:bold}

/* 浮动伤害/治疗/护盾数字 */
.float-num{
  position:fixed;pointer-events:none;z-index:250;font-weight:900;
  font-size:22px;text-shadow:0 2px 8px rgba(80,45,20,0.8);
  animation:floatUp 1.2s ease-out forwards;
  white-space:nowrap;
}
.float-num.damage{color:#c0392b}
.float-num.heal{color:#27ae60}
.float-num.shield{color:#c4941a}
.float-num.green-shield{color:#3d8b5c}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1)}
  30%{opacity:1;transform:translateY(-18px) scale(1.25)}
  100%{opacity:0;transform:translateY(-60px) scale(0.7)}
}
</style>
</head>
<body>

<!-- ====== 主菜单界面 ====== -->
<div id="menu-screen" class="screen active" style="display:flex;flex-direction:column">
  <div class="menu-title">📜 旧日圣契</div>
  <div class="menu-subtitle">回合制卡牌对战 · 6名角色 · 119张卡牌</div>
  <div class="menu-buttons">
    <button class="menu-btn menu-btn-start" onclick="goToLobby()">⚔️ 开始游戏</button>

// ==================== WebSocket ====================
let pendingMessages = []; // 断线期间暂存的消息队列

function connectWS(){
  console.log('[WS] Connecting to', WS_URL);
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    console.log('[WS] Connected');
    document.getElementById('lobby-error').textContent = '';
    // 断线重连：如果在游戏中，自动发送RECONNECT恢复状态
    if (myRoomCode && myPlayerId) {
      console.log('[WS] Auto-reconnecting to room', myRoomCode);
      send('RECONNECT', { roomCode: myRoomCode, playerId: myPlayerId });
    }
    // 清空暂存的消息队列（RECONNECT会重新同步完整状态，旧消息已过时）
    if (pendingMessages.length > 0) {
      console.log('[WS] Dropping', pendingMessages.length, 'stale pending messages after reconnect');
      pendingMessages = [];
    }
  };
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      console.log('[WS] ←', msg.type, msg.payload ? JSON.stringify(msg.payload).slice(0, 120) : '');
      handleServerMessage(msg);
    } catch(err) {
      console.error('[WS] Parse error:', err.message, 'raw:', String(e.data).slice(0, 200));
    }
  };
  ws.onclose = (e) => {
    console.log('[WS] ❌ Disconnected (code=' + e.code + '), retrying in 2s...');
    setTimeout(connectWS, 2000);
  };
  ws.onerror = (err) => {
    console.error('[WS] ⚠️ Error - readyState=' + (ws ? ws.readyState : 'null'), err);
  };
}

function send(type, payload={}){
  console.log('[WS] →', type, JSON.stringify(payload).slice(0, 120));
  if(ws && ws.readyState === WebSocket.OPEN){
    ws.send(JSON.stringify({type, timestamp: Date.now(), payload}));
  } else if (ws && ws.readyState === WebSocket.CONNECTING) {
    // 连接中，暂存消息
    console.log('[WS] Queuing message (CONNECTING)');
    pendingMessages.push({type, payload});
    showError('正在连接服务器，请稍候...');
  } else {
    // 未连接或已关闭
    console.error('[WS] Cannot send - readyState=' + (ws ? ws.readyState : 'null'));
    pendingMessages.push({type, payload});
    showError('服务器连接已断开，正在重连...');
    // 触发重连
    if (!ws || ws.readyState === WebSocket.CLOSED) {
      connectWS();
    }
  }
}

// ==================== 选角倒计时 ====================
function stopPickCountdown() {
  if (pickCountdownTimer) { clearInterval(pickCountdownTimer); pickCountdownTimer = null; }
  const box = document.getElementById('pick-countdown-box');
  if (box) box.style.display = 'none';
}

function startPickCountdown() {
  stopPickCountdown();
  pickCountdownValue = 60;
  const box = document.getElementById('pick-countdown-box');
  const num = document.getElementById('pick-cd-num');
  if (!box || !num) return;
  box.style.display = 'flex';
  box.classList.remove('urgent');
  num.textContent = pickCountdownValue;
  pickCountdownTimer = setInterval(() => {
    pickCountdownValue--;
    num.textContent = pickCountdownValue;
    if (pickCountdownValue <= 10) box.classList.add('urgent');
    else box.classList.remove('urgent');
    if (pickCountdownValue <= 0) {
      stopPickCountdown();
      // 超时：有预选则确认，否则随机选
      if (pickingPhase && myPlayerId) {
        if (preselectedChar) {
          confirmPick();
        } else {
          // 随机选一个未被选的角色
          const pickedChars = (gameState?.players || []).filter(p => p.character).map(p => p.character);
          const available = Object.keys(CHARACTERS).filter(c => !pickedChars.includes(c));
          if (available.length > 0) {
            const pick = available[Math.floor(Math.random() * available.length)];
            preselectedChar = pick;
            renderPickScreen();
            confirmPick();
          }
        }
      }
    }
  }, 1000);
}

function doPlayCard(cardIdx, targets){
  const isMyChain = gameState?.awaitingChain && gameState.chainPlayerId === myPlayerId;

    sfxCardPlay(fxKey, isSkill);

  if(isMyChain){
    send('CHAIN_CONTINUE', {
      playerId: myPlayerId,
      continue: true,
      cardId: cardId,
      targets: targets || []
    });
  } else {
    send('PLAY_CARD', {
      playerId: myPlayerId,
      cardId: cardId,
      targets: targets || []
    });
  }
  // playsLeft 由 STATE_SYNC 权威更新，客户端不自行修改
}

// ==================== 服务端消息处理 ====================
function handleServerMessage(msg){
  const {type, payload} = msg;
  try {
  switch(type){
    case 'ROOM_CREATED':
      myPlayerId = payload.playerId;
      myRoomCode = payload.roomCode;
      mySeatIndex = payload.seatIndex;
      document.getElementById('room-code-display').textContent = myRoomCode;
      document.getElementById('my-room-info').style.display = 'block';
      document.getElementById('btn-roll-dice').style.display = (mySeatIndex===0)?'block':'none';
      document.getElementById('btn-roll-dice').disabled = true;
      document.getElementById('lobby-hint').textContent = '等待其他玩家加入 (至少2人)...';
      // Render initial player slot (host = self)
      renderLobbyPlayers([{id:myPlayerId,nickname:(document.getElementById('nickname-input').value.trim()||'Player'),seatIndex:0}]);
      break;

    case 'JOINED':
      myPlayerId = payload.playerId;
      myRoomCode = payload.roomCode;
      mySeatIndex = payload.seatIndex;
      document.getElementById('room-code-display').textContent = myRoomCode;
      document.getElementById('my-room-info').style.display = 'block';
      document.getElementById('btn-roll-dice').style.display = 'none';
      document.getElementById('lobby-hint').textContent = '✅ 成功加入房间，等待房主开局...';
      break;

    case 'STATE_SYNC':
      {
      // 旧快照 = 上一次 STATE_SYNC 的状态；新快照 = 本次 payload
      const oldSnap = prevPlayerSnapshot;
      const newSnap = buildPlayerSnapshot(payload);
      pendingFloatDiff = { oldSnap: oldSnap, newSnap: newSnap };
      prevPlayerSnapshot = newSnap;
      }
      gameState = payload;
      // 大厅阶段：刷新玩家列表
      if (gameState.phase === 'WAITING' || gameState.phase === 'ROLLING') {
        if(gameState.players) renderLobbyPlayers(gameState.players);
        // 房主：足够人数后启用掷骰按钮
        const isHost = mySeatIndex === 0;
        if(isHost && gameState.phase === 'WAITING'){
          const aliveCount = (gameState.players||[]).length;
          const btn = document.getElementById('btn-roll-dice');
          btn.disabled = aliveCount < 2;
          btn.textContent = aliveCount < 2
            ? '🎲 等待玩家加入...'
            : `🎲 掷骰开局 (${aliveCount}人)`;
          document.getElementById('lobby-hint').textContent =
            aliveCount < 2 ? '等待其他玩家加入 (至少2人)...'
            : `已有 ${aliveCount} 名玩家，可以开局！`;
        }
      }
      // 游戏阶段 → 游戏界面
      if (gameState.phase === 'PLAYING' || gameState.phase === 'DEALING') {
        if (!document.getElementById('game-screen').classList.contains('active')) {
          showScreen('game-screen');
        }
        // 更新牌库/弃牌计数
        const me = (gameState.players||[]).find(p=>p.id===myPlayerId);
        if(me){
          myDeckCount = me.deckCount || 0;
          document.getElementById('deck-count').textContent = myDeckCount;
          document.getElementById('discard-count').textContent = me.discardCount || 0;
        }
        updateGameUI();
              } else if (gameState.phase === 'PICKING') {
        if (!document.getElementById('pick-screen').classList.contains('active')) {
          showScreen('pick-screen');
        }
        // Use server-provided pickOrder, fallback to global
        const pickOrder = (gameState.pickOrder && gameState.pickOrder.length > 0) ? gameState.pickOrder : pickOrderGlobal;
        if(pickOrder && pickOrder.length > 0) pickOrderGlobal = pickOrder;
        const players = gameState.players || [];
        const myPickIdx = pickOrder.indexOf(myPlayerId);
        const pickedCount = players.filter(p=>p.character).length;
        const allPicked = pickedCount >= players.length;
        if(allPicked){
          // Everyone picked, wait for server to transition
          document.getElementById('pick-info').innerHTML = '⏳ 选角完成，等待开局...';
          pickingPhase = false;
          stopPickCountdown();
        } else if (myPickIdx === pickedCount) {
          const wasMyTurn = pickingPhase;
          pickingPhase = true;
          document.getElementById('pick-info').innerHTML =
            '🟢 <b>轮到你了！</b>点击角色预览 → 确认选择';
          if (!wasMyTurn) startPickCountdown();
        } else if (myPickIdx >= 0) {
          pickingPhase = false;
          stopPickCountdown();
          const nextPid = pickOrder[pickedCount];
          const nextP = players.find(p=>p.id===nextPid);
          document.getElementById('pick-info').innerHTML =
            `⏳ 等待 <b>${nextP?.character||nextP?.nickname||'?'}</b> 选角中...`;
        }
        renderPickScreen(pickOrder, []);
      }
      break;

    case 'YOUR_HAND':
      {
      const newHandRaw = payload.hand || [];
      // 检测新抽到的牌（用于动画）
      const prevSet = new Set(prevHand);
      const newCards = newHandRaw.filter(id => !prevSet.has(id));
      // 记录当前选中的卡牌ID（排序前）
      const selectedCardId = (selectedCardIdx >= 0 && selectedCardIdx < myHand.length)
        ? myHand[selectedCardIdx] : null;
      // 排序手牌
      myHand = sortHand(newHandRaw);
      prevHand = [...myHand];
      // 排序后找回选中卡牌的下标
      if (selectedCardId !== null) {
        selectedCardIdx = myHand.indexOf(selectedCardId);
      } else {
        selectedCardIdx = -1;
      }
      myDiscardPile = payload.discardPile || [];
      myDeckCount = payload.deckCount || 0;
      document.getElementById('deck-count').textContent = myDeckCount;
      document.getElementById('discard-count').textContent = myDiscardPile.length;
      updateHandUI();
      // 抽牌动画
      if (newCards.length > 0) {
        animateDrawCards(newCards);
      }
      // 刺客窥视 step1：展示对手手牌供偷取
      if(payload.peekedHand && payload.peekTargetId){
        peekedHand = payload.peekedHand;
        peekTargetId = payload.peekTargetId;
        showStealPicker(peekedHand, peekTargetId);
      }
      // 刺客窥视 step2：展示自己手牌供归还
      if(payload.giftPickMode){
        showGiftPickerFromOwn();
      }
      } // end YOUR_HAND block
      break;

    case 'DICE_ROLLED':
      // 显示掷骰结果动画
      showDiceRoll(payload);
      break;

    case 'CHARACTER_PICKED':
      // Someone picked — clear preselection, STATE_SYNC will refresh the grid
      preselectedChar = null;
      break;

    case 'GAME_STARTED':
      stopPickCountdown();
      showScreen('game-screen');
      prevPlayerSnapshot = {};  // 重置浮动数字快照
      // 延迟一帧确保 screen 已 visible，再 resize canvas
      setTimeout(() => { if (typeof fxResize === 'function') fxResize(); }, 50);
      document.getElementById('game-room-code').textContent = myRoomCode;
      pickingPhase = false;
      selectedCardIdx = -1;
      selectedTargets = [];
      break;

    case 'GAME_OVER':
      if(countdownTimer){clearInterval(countdownTimer);countdownTimer=null;}
      showGameOver(payload);
      break;

    case 'TIMEOUT':
      // 超时提示
      break;

    case 'ERROR':
      showError(payload.msg || '未知错误');
      break;

    case 'RECONNECTED':
      myPlayerId = payload.playerId;
      myRoomCode = payload.roomCode;
      showScreen('game-screen');
      document.getElementById('game-room-code').textContent = myRoomCode;
      break;

    case 'PONG':
      break;
  }
  } catch(err) {
    console.error('[MSG] Error handling', type, ':', err.message, err.stack);
  }
}

// ==================== 掷骰显示 ====================
function showDiceRoll(payload){
  showScreen('pick-screen');
  const rolls = payload.rolls || [];
  const pickOrder = payload.pickOrder || [];
  pickOrderGlobal = pickOrder; // 保存供 STATE_SYNC 使用
  const myRoll = rolls.find(r=>r.playerId===myPlayerId);
  const pickOrderStr = pickOrder.map((pid,i)=>{
    const r = rolls.find(r2=>r2.playerId===pid);
    return `${i+1}.${r?.nickname||'?'}(${r?.diceRoll||0}点)`;
  }).join(' → ');

  // 判断是否轮到我
  const isFirstPicker = pickOrder[0] === myPlayerId;
  if(myRoll){
    if(isFirstPicker){
      document.getElementById('pick-info').innerHTML =
        `🎲 你掷出 <b>${myRoll.diceRoll}</b> 点！` +
        ` 选角顺序：${pickOrderStr}` +
        `<br>🟢 <b>你是第一位，请选择角色</b>`;
    } else {
      document.getElementById('pick-info').innerHTML =
        `🎲 你掷出 <b>${myRoll.diceRoll}</b> 点！` +
        ` 选角顺序：${pickOrderStr}` +
        `<br>⏳ 等待前面的玩家选角...`;
    }
  }
  pickingPhase = isFirstPicker;
  preselectedChar = null;
  renderPickScreen(pickOrder, rolls);
}

// ==================== 游戏UI渲染 ====================
function updateGameUI(){
  if(!gameState) return;

  const roomCode = gameState.roomCode || myRoomCode;
  document.getElementById('game-room-code').textContent = roomCode;

  // 更新阶段文字
  const phaseMap = {
    'WAITING':'等待玩家', 'ROLLING':'掷骰中', 'PICKING':'选角中',
    'DEALING':'发牌中', 'PLAYING':'对战中', 'GAME_OVER':'游戏结束'
  };
  document.getElementById('phase-text').textContent = phaseMap[gameState.phase] || gameState.phase;
  document.getElementById('turn-info').textContent = `回合 ${gameState.turnCount||0}`;

  // 确定我在不在游戏中、是不是我的回合
  const players = gameState.players || [];
  const me = players.find(p=>p.id===myPlayerId);
  const currentPlayerId = (gameState.turnOrder||[])[gameState.currentPlayerIndex||0];
  const wasMyTurn = isMyTurn;
  isMyTurn = (currentPlayerId === myPlayerId) &&
             gameState.phase === 'PLAYING' && me && me.isAlive;
  const isMyChain = gameState.awaitingChain && gameState.chainPlayerId === myPlayerId;

  // 回合切换音效
  if(isMyTurn && !wasMyTurn) sfxTurnStart();
  // 连锁提示音
  if(isMyChain && !gameState?.awaitingChain) sfxChain();

  // 同步服务端下发的剩余出牌次数
  if(isMyTurn || isMyChain){
    playsLeft = (gameState.playsRemaining != null) ? gameState.playsRemaining : 1;
  } else {
    playsLeft = 0;
  }

  // 渲染面板
  renderBoard(players, currentPlayerId);
  flushFloatDiffs();         // DOM 已就绪，开始浮动数字
  updateHandUI();
  updateActionBar();
  updateLogPanel();
  updateIconLegend();
  updateCountdown();
  updateLightningCounter();

  // 游戏结束
  if(gameState.phase === 'GAME_OVER'){
    showGameOverFromState(players);
  }
}

// ==================== 浮动伤害/治疗/护盾数字 ====================
function buildPlayerSnapshot(gs) {
  const snap = {};
  if (!gs || !gs.players) return snap;
  for (const p of gs.players) {
    snap[p.seatIndex] = { hp: p.hp, shield: p.shield || 0, greenShield: p.greenShield || 0, alive: p.isAlive };
  }
  return snap;
}

function spawnFloatingNum(seatIndex, text, cls) {
  const card = document.querySelector('.player-card[data-seat="' + seatIndex + '"]');
  if (!card) return;
  const rect = card.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'float-num ' + cls;
  el.textContent = text;
  el.style.left = (rect.left + rect.width/2 - 30) + 'px';
  el.style.top = (rect.top + 4) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

/** 在 renderBoard 之后调用 —— DOM 已存在 */
function flushFloatDiffs() {
  if (!pendingFloatDiff) return;
  const { oldSnap, newSnap } = pendingFloatDiff;
  pendingFloatDiff = null;
  for (const seat of Object.keys(newSnap)) {
    const seatNum = parseInt(seat);
    const now = newSnap[seat];
    const old = oldSnap[seat] || { hp: now.hp, shield: now.shield || 0, greenShield: now.greenShield || 0, alive: true };
    if (!now.alive && old.alive) {
      spawnFloatingNum(seatNum, '💀', 'damage');
      continue;
    }
    const hpDelta = (now.hp || 0) - (old.hp || 0);
    if (hpDelta < 0) {
      spawnFloatingNum(seatNum, hpDelta.toString(), 'damage');
    } else if (hpDelta > 0) {
      spawnFloatingNum(seatNum, '+' + hpDelta, 'heal');
    }
    const sdDelta = (now.shield || 0) - (old.shield || 0);
    if (sdDelta > 0) {
      spawnFloatingNum(seatNum, '🛡️+' + sdDelta, 'shield');
    } else if (sdDelta < 0) {
      spawnFloatingNum(seatNum, '🛡️' + sdDelta, 'damage');
    }
    const gsDelta = (now.greenShield || 0) - (old.greenShield || 0);
    if (gsDelta > 0) {
      spawnFloatingNum(seatNum, '🔰+' + gsDelta, 'green-shield');
    } else if (gsDelta < 0) {
      spawnFloatingNum(seatNum, '🔰' + gsDelta, 'damage');
    }
  }
}

function renderBoard(players, currentPlayerId){
  const board = document.getElementById('board');
  const me = players.find(p=>p.id===myPlayerId);
  if(!me) return;

  const others = players.filter(p=>p.id!==myPlayerId).sort((a,b)=>a.seatIndex-b.seatIndex);
  const total = players.length;

  // 构建十字布局：上方对手 → 左右对手+空白 → 下方自己
  let topRow = '', midRow = '', botRow = '';

  if(total === 2){
    // 2人：对手在上，我在下
    topRow = `<div class="board-row">${renderPlayerCard(others[0], currentPlayerId)}</div>`;
    midRow = `<div class="board-row" style="font-size:24px;color:var(--text-dim);padding:10px">⚔️ VS ⚔️</div>`;
    botRow = `<div class="board-row">${renderPlayerCard(me, currentPlayerId)}</div>`;
  } else if(total === 3){
    // 3人：两个对手并排在上，我在下
    topRow = `<div class="board-row">${others.map(p=>renderPlayerCard(p, currentPlayerId)).join('')}</div>`;
    midRow = `<div class="board-row" style="font-size:20px;color:var(--text-dim);padding:6px">━━━━━━━━</div>`;
    botRow = `<div class="board-row">${renderPlayerCard(me, currentPlayerId)}</div>`;
  } else {
    // 4人：三人并排在上，我在下
    topRow = `<div class="board-row">${others.map(p=>renderPlayerCard(p, currentPlayerId)).join('')}</div>`;
    midRow = `<div class="board-row" style="font-size:20px;color:var(--text-dim);padding:6px">━━━━━━━━</div>`;
    botRow = `<div class="board-row">${renderPlayerCard(me, currentPlayerId)}</div>`;
  }

  board.innerHTML = `<div class="board-inner">${topRow}${midRow}${botRow}</div>`;
}

function renderPlayerCard(p, currentPlayerId){
  const charInfo = CHARACTERS[p.character] || {};
  const color = CHAR_COLORS[p.character] || '#888';
  const hpPct = p.maxHp > 0 ? (p.hp / p.maxHp * 100) : 0;
  const hpColor = hpPct > 60 ? '#5aaa60' : hpPct > 30 ? '#c4941a' : '#c0392b';
  const isCurrent = p.id === currentPlayerId;
  const isDead = !p.isAlive;
  const isMe = p.id === myPlayerId;

  return `
    <div class="player-card ${isCurrent?'current-turn':''} ${isDead?'dead':''} ${!p.connected?'disconnected':''}
         ${isMyTurn&&!isMe&&!isDead?'targetable':''}"
         ${(isMyTurn&&!isMe&&!isDead)?`onclick="selectTarget(${p.seatIndex})"`:''}
         data-seat="${p.seatIndex}">
      <div style="display:flex;align-items:center">
        <span class="char-icon">${charInfo.emoji||'❓'}</span>
        <span class="name">${p.character||'未选择'} ${isMe?'(我)':''}</span>
      </div>
      <div class="hp-bar"><div class="hp-fill" style="width:${hpPct}%;background:${hpColor}"></div></div>
      <div style="font-size:11px">❤️ ${p.hp}/${p.maxHp} | 🛡️ ${p.shield||0} | 🔰 ${p.greenShield||0}</div>
      <div style="font-size:10px;color:var(--text-dim);margin-top:2px">🎴${p.handCount!=null?p.handCount:'?'} 📚${p.deckCount!=null?p.deckCount:'?'} 🗑️${p.discardCount!=null?p.discardCount:'?'}</div>
      <div class="buffs">${(p.buffs||[]).join(' ')}</div>
      ${p.beastForm?`<div class="beast-badge" style="background:${color}33;color:${color};font-weight:bold;font-size:13px;margin-top:4px;display:flex;align-items:center;gap:4px">
        ${p.beastForm==='bear'?'🐻 熊形态':p.beastForm==='wolf'?'🐺 狼形态 '+(p.wolfBuff?'⚡+1伤害':'') :'🐯 虎形态'}

// ==================== 手牌排序 ====================
function getCardSortKey(cardId) {
  // 图标分类：攻击(0) < 技能Buff(1) < 护盾(2) < 治疗(3) < 抽牌连击(4)
  const EFFECT_CAT = {
    '🗡️':0, '⛈️':0, '👀':0, '♻️':0, '💥':0,           // 攻击/进攻
    '🩸':1, '🙏':1, '🫥':1, '🐾':1, '🐻':1, '🐺':1, '🐯':1, // Buff/变身
    '🛡️':2, '🔰':2,                                        // 护盾
    '❤️':3, '💕':3,                                        // 治疗
    '🃏':4, '⚡':4,                                        // 抽牌/闪电连击
  };
  const card = CARDS_LOCAL[cardId];
  if (!card) return { cat: 9, str: 0, name: cardId };
  const effects = card.effects || [];
  let cat = 9;
  let atk = 0, shd = 0, heal = 0, draw = 0;
  for (const e of effects) {
    const c = EFFECT_CAT[e];
    if (c !== undefined && c < cat) cat = c;
    if (e === '🗡️') atk++;
    else if (e === '🛡️' || e === '🔰') shd++;
    else if (e === '❤️' || e === '💕') heal++;
    else if (e === '🃏') draw++;
  }
  // str 为负数，强度越高值越小（越靠左）
  const str = -(atk * 1000 + shd * 100 + heal * 10 + draw);
  return { cat, str, name: card.name };
}

function sortHand(hand) {
  if (!hand || hand.length <= 1) return hand ? [...hand] : [];
  return [...hand].sort((a, b) => {
    const ka = getCardSortKey(a);
    const kb = getCardSortKey(b);
    if (ka.cat !== kb.cat) return ka.cat - kb.cat;
    if (ka.str !== kb.str) return ka.str - kb.str;
    return ka.name.localeCompare(kb.name);
  });
}

// ==================== 抽牌动画 ====================
function animateDrawCards(cardIds) {
  const deckEl = document.querySelector('.deck-stack');
  if (!deckEl) return;
  const deckRect = deckEl.getBoundingClientRect();
  const handArea = document.getElementById('hand-area');
  const handRect = handArea.getBoundingClientRect();
  // 目标：手牌区域中心偏下
  const targetX = handRect.left + handRect.width / 2;
  const targetY = handRect.top + handRect.height * 0.55;

  cardIds.forEach((cardId, i) => {
    const card = CARDS_LOCAL[cardId] || { name: cardId, effects: [], desc: '', character: '' };
    const color = CHAR_COLORS[card.character] || '#888';
    const floatCard = document.createElement('div');
    floatCard.className = 'card float-draw';
    floatCard.style.cssText = `
      position: fixed; left: ${deckRect.left + deckRect.width/2 - 50}px;
      top: ${deckRect.top}px; width: 100px; height: 145px; z-index: 200;
      border-color: ${color}; pointer-events: none;
      transition: all 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    `;
    floatCard.innerHTML = `
      <div class="card-char-tag" style="color:${color}">${card.character||''}</div>
      <div class="card-name">${card.name}</div>
      <div class="card-icons">${(card.effects||[]).join('')}</div>
      <div class="card-desc">${card.desc}</div>
    `;
    document.body.appendChild(floatCard);

    // 第一帧后飞向手牌区域
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        const spreadX = targetX + (i - (cardIds.length - 1) / 2) * 70;
        floatCard.style.left = `${spreadX - 50}px`;
        floatCard.style.top = `${targetY - 72}px`;
        floatCard.style.transform = 'scale(1.08)';
        floatCard.style.opacity = '0.92';
      });
    });

    // 落地后淡出移除
    setTimeout(() => {
      floatCard.style.transition = 'opacity 0.2s ease-out';
      floatCard.style.opacity = '0';
      setTimeout(() => floatCard.remove(), 220);
    }, 430 + i * 80);
  });
}

function onCardClick(idx){
  // 仅选中/取消选中卡牌，不自动打出
  const canAct = isMyTurn || (gameState?.awaitingChain && gameState.chainPlayerId === myPlayerId);
  if(!canAct) return;
  if(idx === selectedCardIdx){
    // 取消选中
    selectedCardIdx = -1;
    selectedTargets = [];
  } else {
    selectedCardIdx = idx;
    selectedTargets = [];
  }
  updateHandUI();
  updateActionBar();
}

function confirmPlayCard(){
  const canAct = isMyTurn || (gameState?.awaitingChain && gameState.chainPlayerId === myPlayerId);
  if(!canAct) return;
  if(selectedCardIdx < 0) return;
  const targets = selectedTargets;

  doPlayCard(selectedCardIdx, targets);

  selectedCardIdx = -1;
  selectedTargets = [];
  updateHandUI();
  updateActionBar();

  // 出牌权归零 → 停倒计时，避免归零时 autoPlayAnyCard 又打一张
  if(playsLeft <= 0){
    if(countdownTimer){ clearInterval(countdownTimer); countdownTimer = null; }
    document.getElementById('countdown-box').style.display = 'none';
  }
}

function selectTarget(seatIndex){
  const canAct = isMyTurn || (gameState?.awaitingChain && gameState.chainPlayerId === myPlayerId);
  if(!canAct || selectedCardIdx < 0) return;
  const card = CARDS_LOCAL[myHand[selectedCardIdx]];
  if(!card) return;
  const needsTarget = (card.effects||[]).some(e=>['🗡️','♻️','⛈️','👀'].includes(e));
  if(!needsTarget) return;

  // 切换目标 — click again to deselect
  const idx = selectedTargets.indexOf(seatIndex);
  if(idx >= 0){
    selectedTargets.splice(idx, 1);
  } else {
    selectedTargets.push(seatIndex);
  }

  // 视觉反馈
  document.querySelectorAll('.player-card.targetable').forEach(el=>{
    const seat = parseInt(el.dataset.seat);
    if(selectedTargets.includes(seat)){
      el.style.borderColor = '#ff0';
      el.style.boxShadow = '0 0 20px rgba(255,255,0,0.6)';
    } else {
      el.style.borderColor = '';
      el.style.boxShadow = '';
    }
  });
  updateActionBar();
}

function autoPlayAnyCard(){
  // 超时/强制出牌：手牌中随机选一张打出
  if(!myHand || myHand.length === 0) return;
  const isMyChain = gameState?.awaitingChain && gameState.chainPlayerId === myPlayerId;
  if(!isMyTurn && !isMyChain) return;

  let idx = myHand.findIndex(cid=>{
    const c = CARDS_LOCAL[cid];
    return c && !(c.effects||[]).some(e=>['🗡️','♻️','⛈️','👀'].includes(e));
  });
  if(idx < 0) idx = 0;

  const cardId = myHand[idx];
  if(isMyChain){
    send('CHAIN_CONTINUE', {playerId:myPlayerId, continue:true, cardId:cardId, targets:[]});
  } else {
    send('PLAY_CARD', {playerId:myPlayerId, cardId:cardId, targets:[]});
  }
  selectedCardIdx = -1;
  selectedTargets = [];
}

function updateActionBar(){
  const isMyChain = gameState?.awaitingChain && gameState.chainPlayerId === myPlayerId;
  const playBtn = document.getElementById('btn-play-card');
  const passBtn = document.getElementById('btn-pass-turn');
  const badge = document.getElementById('playable-badge');
  const badgeCount = document.getElementById('playable-count');
  const hintEl = document.getElementById('action-hint');

  const canAct = isMyTurn || isMyChain;

  // 出牌按钮
  playBtn.style.display = (canAct && playsLeft > 0) ? 'inline-block' : 'none';
  // 过牌按钮：轮到就显示，始终橙色可点
  passBtn.style.display = canAct ? 'inline-block' : 'none';
  passBtn.removeAttribute('disabled');
  passBtn.classList.add('active');

  // 剩余出牌数徽章
  if(canAct){
    badge.style.display = 'flex';
    badgeCount.textContent = playsLeft;
    if(playsLeft > 0){
      badgeCount.style.color = '#ffd700';
      badge.style.opacity = '1';
    } else {
      badgeCount.style.color = '#888';
      badge.style.opacity = '0.5';
    }
  } else {
    badge.style.display = 'none';
  }

  const hasCard = selectedCardIdx >= 0;
  const card = hasCard ? CARDS_LOCAL[myHand[selectedCardIdx]] : null;
  const needsTarget = card && (card.effects||[]).some(e=>['🗡️','♻️','⛈️','👀'].includes(e));
  const ready = hasCard && (!needsTarget || selectedTargets.length >= 1);

  playBtn.disabled = !ready;
  playBtn.style.opacity = ready ? '1' : '0.4';

  if(isMyChain){
    playBtn.textContent = '⚡ 出牌';
    if(!hasCard){
      hintEl.textContent = '⚡ 剩余 ' + playsLeft + ' 次出牌！选择一张手牌打出';
    } else if(needsTarget && selectedTargets.length === 0){
      hintEl.textContent = '⚡ 点击敌方玩家选择目标 (剩余' + playsLeft + '次)';
    } else {
      hintEl.textContent = '⚡ 点击「出牌」打出 (剩余' + playsLeft + '次)';
    }
  } else if(isMyTurn){
    if(playsLeft > 0){
      playBtn.textContent = '🎴 出牌';
      if(!hasCard){
        hintEl.textContent = '必须出牌！剩余 ' + playsLeft + ' 次';
      } else if(needsTarget && selectedTargets.length === 0){
        hintEl.textContent = '点击敌方玩家选择攻击目标';
      } else {
        hintEl.textContent = '点击「出牌」打出卡牌';
      }
    } else {
      hintEl.textContent = '出牌完毕，点击「过牌」结束回合';
    }
  } else if(gameState?.awaitingChain){
    hintEl.textContent = '等待其他玩家连锁...';
  } else {
    hintEl.textContent = '等待其他玩家行动...';
  }
}

// ==================== 闪电连锁计数器 ====================
function updateLightningCounter(){
  // 使用 playsRemaining 统一显示（来自服务端 STATE_SYNC）
  const el = document.getElementById('lightning-counter');
  if(!el) return;
  const remaining = document.getElementById('chain-remaining');
  if(!remaining) return;

  const someoneChaining = gameState?.awaitingChain;
  if(someoneChaining && remaining){
    el.style.display = 'flex';
    const left = (gameState.playsRemaining != null) ? gameState.playsRemaining : 0;
    remaining.textContent = left;
    remaining.style.color = left <= 1 ? '#a83232' : '#b8860b';
  } else {
    el.style.display = 'none';
  }
}

function updateCountdown(){
  const box = document.getElementById('countdown-box');
  const num = document.getElementById('cd-num');
  const isMyChain = gameState?.awaitingChain && gameState.chainPlayerId === myPlayerId;

  // 不在自己回合也不在连锁 → 隐藏倒计时，清除自动模式
  if(!isMyTurn && !isMyChain){
    box.style.display = 'none';
    if(countdownTimer){clearInterval(countdownTimer);countdownTimer=null;}
    autoPlayMode = false;
    return;
  }

  // 自动连打模式：只要还有出牌权、手牌不为空、不在连锁/换牌等待，就立刻再出一张
  if(autoPlayMode && isMyTurn && !isMyChain && !gameState?.awaitingChain
     && !gameState?._pendingStealPick && !gameState?._pendingGiftPick){
    if(playsLeft > 0 && myHand.length > 0){
      autoPlayAnyCard();
      return;
    } else {
      // 出牌权用完或没手牌 → 结束自动模式，过牌
      autoPlayMode = false;
      box.style.display = 'none';
      if(countdownTimer){clearInterval(countdownTimer);countdownTimer=null;}
      send('END_TURN', {playerId: myPlayerId});
      return;
    }
  }

  // 出牌权已用尽 → 不重启倒计时
  if(playsLeft <= 0 && !isMyChain){
    box.style.display = 'none';
    if(countdownTimer){clearInterval(countdownTimer);countdownTimer=null;}
    return;
  }

  box.style.display = 'flex';
  if(!countdownTimer){
    countdownValue = isMyChain ? 15 : 100;
    num.textContent = countdownValue;
    box.classList.remove('urgent');
    countdownTimer = setInterval(()=>{
      countdownValue--;
      num.textContent = countdownValue;
      if(countdownValue <= 10) box.classList.add('urgent');
      else box.classList.remove('urgent');
      if(countdownValue <= 0){
        clearInterval(countdownTimer);
        countdownTimer = null;
        if(isMyChain){
          send('CHAIN_CONTINUE', { playerId: myPlayerId, continue: false });
        } else if(playsLeft > 0 && myHand.length > 0){
          // 倒计时归零 → 进入自动连打模式，根据剩余出牌次数打出对应张数
          autoPlayMode = true;
          autoPlayAnyCard();
        } else {
          // 已出过牌 → 自动过牌
          send('END_TURN', {playerId: myPlayerId});
        }
      }
    }, 1000);
  }
}

function triggerEffect(charKey, cardType, x, y){
  const fx = FX[charKey]; if(!fx) return;
  const w = fxW || window.innerWidth || 960;
  const h = fxH || window.innerHeight || 540;
  const cx = Math.max(30, Math.min(w-30, x||w/2));
  const cy = Math.max(30, Math.min(h-30, y||h*0.5));
  if(cardType==='skill' && fx.skill) fx.skill(cx,cy);
  else fx.base(cx,cy);
}

function fxAnimate(){
  fxCtx.clearRect(0,0,fxW,fxH);
  // Screen shake — ensure save/restore is always balanced
  let didSave = false;
  if(fxScreenShake>0){
    let sx=(Math.random()-0.5)*fxScreenShake,sy=(Math.random()-0.5)*fxScreenShake;
    fxCtx.save(); didSave = true;
    fxCtx.translate(sx,sy);
    fxScreenShake*=0.85;
    if(fxScreenShake<0.5)fxScreenShake=0;
  }
  fxCtx.shadowColor = 'rgba(255,255,255,0.3)';
  fxCtx.shadowBlur = 8;
  for(let i=fxParticles.length-1;i>=0;i--){let p=fxParticles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=p.drag;p.vy*=p.drag;p.vy+=p.gravity;p.life-=p.decay;p.size*=0.996;if(p.life<=0||p.size<0.3)fxParticles.splice(i,1);}
  for(let i=fxRings.length-1;i>=0;i--){let r=fxRings[i];r.life-=0.018;r.radius+=(r.maxRadius-r.radius)*0.05;r.width*=0.98;if(r.life<=0||r.width<0.1)fxRings.splice(i,1);}
  for(let i=fxFlashes.length-1;i>=0;i--){let f=fxFlashes[i];f.life-=0.025;f.size*=0.96;if(f.life<=0||f.size<1.5)fxFlashes.splice(i,1);}
  for(let pf of fxParticles){let a=Math.min(1,(pf.life/pf.maxLife)*1.4);fxCtx.globalAlpha=a;fxCtx.fillStyle=pf.color;if(pf.glow){fxCtx.shadowColor=pf.color;fxCtx.shadowBlur=pf.size*2;}else{fxCtx.shadowBlur=0;}fxCtx.beginPath();fxCtx.arc(pf.x,pf.y,Math.max(0.5,pf.size),0,Math.PI*2);fxCtx.fill();}
  fxCtx.shadowBlur=0;
  for(let r of fxRings){let a=Math.min(1,(r.life/r.maxLife)*1.8);fxCtx.globalAlpha=a*0.6;fxCtx.strokeStyle=r.color;fxCtx.lineWidth=r.width;fxCtx.shadowColor=r.color;fxCtx.shadowBlur=r.width*2;fxCtx.beginPath();fxCtx.arc(r.x,r.y,r.radius,0,Math.PI*2);fxCtx.stroke();}
  fxCtx.shadowBlur=0;
  for(let f of fxFlashes){let a=Math.min(1,(f.life/f.maxLife)*2.2);let g=fxCtx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.size);g.addColorStop(0,f.color);g.addColorStop(1,'transparent');fxCtx.globalAlpha=a*0.6;fxCtx.fillStyle=g;fxCtx.beginPath();fxCtx.arc(f.x,f.y,f.size,0,Math.PI*2);fxCtx.fill();}
  fxCtx.globalAlpha=1;
  if(didSave) fxCtx.restore();
  requestAnimationFrame(fxAnimate);
}

function playCardEffect(character, cardId){
  const fxKey = CHAR_FX_MAP[character]; if(!fxKey) return;
  const card = CARDS_LOCAL[cardId]; if(!card) return;
  const isSkill = (card.effects||[]).some(e=>SKILL_EFFECTS.has(e));
  // 以游戏面板中心为特效起点
  const board = document.getElementById('board');
  const br = board ? board.getBoundingClientRect() : null;
  const cx = br ? br.left + br.width/2 + fxRand(-120,120) : fxW/2 + fxRand(-160,160);
  const cy = br ? br.top + br.height*0.4 + fxRand(-60,60) : fxH*0.65 + fxRand(-80,80);
  triggerEffect(fxKey, isSkill?'skill':'base', cx, cy);
}

// ==================== 音效引擎（低延迟 Web Audio API） ====================
let audioCtx = null;
function initAudio(){ if(!audioCtx) audioCtx = new(window.AudioContext||window.webkitAudioContext)(); }

// 首个用户交互时预热 AudioContext
document.addEventListener('click', function warmAudio(){ initAudio(); }, {once:true});

function playTone(freq, duration, type, vol, glide, delay){
  if(!audioCtx){ initAudio(); if(!audioCtx) return; }
  const t = audioCtx.currentTime + (delay||0);
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type||'sine';
  osc.frequency.setValueAtTime(freq, t);
  if(glide) osc.frequency.linearRampToValueAtTime(freq*glide, t+duration*0.5);
  gain.gain.setValueAtTime(vol||0.12, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t+duration);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t+duration);
}

function sfxCardSelect(){
  initAudio(); if(!audioCtx) return;
  playTone(800,0.08,'sine',0.06,1.5,0);
  playTone(1200,0.06,'sine',0.04,1.0,0.03);
}
function sfxButtonClick(){
  initAudio(); if(!audioCtx) return;
  playTone(600,0.05,'square',0.03,0.5,0);
}

  warrior:{base:[440,554,660],skill:[330,440,554,660,880]},
  priest:{base:[523,659,784],skill:[392,523,659,784,1047]},
  mage:{base:[330,440,554],skill:[262,330,440,554,660]},
  tank:{base:[392,330,262],skill:[196,262,330,392,523]},
  orc:{base:[349,440,523],skill:[262,349,440,523,698]},
  assassin:{base:[587,698,880],skill:[440,587,698,880,1175]}
};

function sfxCardPlay(character, isSkill){
  initAudio(); if(!audioCtx) return;
  const melody = (SFX_MELODIES[character]||SFX_MELODIES.warrior)[isSkill?'skill':'base'];
  const now = audioCtx.currentTime;
  melody.forEach((freq,i)=>{
    const t = now + i*0.028;
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.type = isSkill?'sawtooth':'triangle';
    osc.frequency.setValueAtTime(freq, t);
    osc.frequency.setValueAtTime(freq*(isSkill?1.4:1.1), t+0.06);
    gain.gain.setValueAtTime(isSkill?0.10:0.08, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.14);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t); osc.stop(t+0.16);
  });
}
